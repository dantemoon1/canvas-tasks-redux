<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Tasks for Canvas Redux</title>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Lato&display=swap');

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        width: 320px;
        padding: 16px;
        font-family: Lato, sans-serif;
        font-size: 14px;
        color: #333;
      }

      h1 {
        font-size: 18px;
        margin-bottom: 12px;
        display: flex;
        align-items: center;
        gap: 8px;
      }

      h1 img {
        width: 24px;
        height: 24px;
      }

      .section {
        margin-bottom: 16px;
      }

      .section-title {
        font-size: 12px;
        font-weight: bold;
        text-transform: uppercase;
        color: #666;
        margin-bottom: 8px;
      }

      .btn {
        display: block;
        width: 100%;
        padding: 10px;
        border: none;
        border-radius: 6px;
        font-size: 14px;
        font-weight: bold;
        cursor: pointer;
        transition: opacity 0.15s;
        text-align: center;
        text-decoration: none;
      }

      .btn:hover {
        opacity: 0.85;
      }

      .btn-primary {
        background-color: #2d3b45;
        color: white;
      }

      .btn-danger {
        background-color: #dc3545;
        color: white;
      }

      .btn-secondary {
        background-color: #e8e8e8;
        color: #333;
      }

      .domain-list {
        list-style: none;
      }

      .domain-item {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 8px;
        background: #f8f9fa;
        border-radius: 4px;
        margin-bottom: 6px;
      }

      .domain-item button {
        background: none;
        border: none;
        color: #dc3545;
        cursor: pointer;
        font-size: 12px;
      }

      .empty-state {
        color: #666;
        font-size: 13px;
        text-align: center;
        padding: 12px;
      }

      .manual-input {
        display: flex;
        gap: 8px;
        margin-top: 8px;
      }

      .manual-input input {
        flex: 1;
        padding: 8px;
        border: 1px solid #ccc;
        border-radius: 4px;
        font-size: 13px;
      }

      .status {
        font-size: 13px;
        padding: 8px;
        border-radius: 4px;
        margin-bottom: 12px;
      }

      .status.info {
        background: #e7f3ff;
        color: #004085;
      }

      .status.success {
        background: #d4edda;
        color: #155724;
      }

      .status.warning {
        background: #fff3cd;
        color: #856404;
      }

      .hidden {
        display: none;
      }
    </style>
  </head>

  <body>
    <h1>
      <img src="../../assets/img/icon-128.png" alt="" />
      Tasks for Canvas Redux
    </h1>

    <div id="current-site-section" class="section hidden">
      <div id="site-status" class="status info"></div>
      <button id="enable-btn" class="btn btn-primary hidden">Enable on this site</button>
      <button id="disable-btn" class="btn btn-danger hidden">Disable on this site</button>
    </div>

    <div class="section">
      <div class="section-title">Enabled Canvas Sites</div>
      <ul id="domain-list" class="domain-list"></ul>
      <div id="no-domains" class="empty-state hidden">No sites enabled yet.</div>
    </div>

    <div class="section">
      <div class="section-title">Add Manually</div>
      <div class="manual-input">
        <input type="text" id="manual-domain" placeholder="canvas.school.edu" />
        <button id="manual-add-btn" class="btn btn-secondary" style="width: auto; padding: 8px 12px;">Add</button>
      </div>
    </div>

    <div class="section">
      <a id="options-link" href="options.html" target="_blank" class="btn btn-secondary">Open Settings</a>
    </div>

  </body>
</html>
